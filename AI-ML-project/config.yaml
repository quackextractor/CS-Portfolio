data:
  raw_positive_dir: "data/raw/positive"
  raw_negative_dir: "data/raw/negative"
  processed_dir: "data/processed"
  dataset_csv: "data/processed/dataset.csv"
  test_split_size: 0.2
  random_seed: 42
model:
  output_path: "vendor/models/target_detector.keras"
  face_detector_model_path: "vendor/models/blaze_face_short_range.tflite"
  img_size: 128
# threshold: 0.5645 # Use model threshold instead
camera:
  index: 0
defaults:
  scrape:
    queries: ["portrait face", "man with glasses", "woman with hat", "beard face"]
    total: 1200
    output_dir: "data/raw/negative/scraped"
  extract:
    output_dir: "data/raw/positive"
    frame_rate: "auto"
    auto_frame_target: [200, 300]
  build:
    skip_blurry: true
    blur_threshold: 10.0
    protected_folders: ["FALSE_POSITIVES"]
  run:
    heatmap_sensitivity: 5.0
    mining:
      enabled: false
      frame_rate: 10
  visualize:
    iterations: 100
    lr: 0.1
    output_dir: "data/processed"
models:
  downloads:
    - description: "BlazeFace short-range face detector (MediaPipe Tasks)"
      url: "https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/latest/blaze_face_short_range.tflite"
      dest: "vendor/models/blaze_face_short_range.tflite"